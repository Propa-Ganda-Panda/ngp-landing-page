<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo Gen Prime | Under Construction</title>
  <meta
    name="description"
    content="Neo Gen Prime official website is currently under construction. For business and media enquiries, contact Business@NeoGenPrime.com"
  />
  <style>
    :root {
      --bg: #05070c;
      --text: #f3f6fb;
      --muted: #a7b0bf;
      --accent: #62cfff;
      --accent-soft: rgba(98, 207, 255, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(3, 6, 10, 0.78), rgba(3, 6, 10, 0.55)),
        url("ngp-background.jpg") center center / cover no-repeat,
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(98, 207, 255, 0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(98, 207, 255, 0.10), transparent 28%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
    }

    .panel {
      position: relative;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: none;
      text-align: center;
      padding: 52px 32px;
      overflow: visible;
    }

.logo {
  position: relative;
  z-index: 1;
  width: min(340px, 78%);
  height: auto;
  display: block;
  margin: 0 auto 18px;
  opacity: 10;
  filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.45));
}

    .slogan {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 0.98rem;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    .tag {
      position: relative;
      z-index: 1;
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(98, 207, 255, 0.24);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 20px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    h1 {
      position: relative;
      z-index: 1;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.03;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    .highlight {
      color: var(--accent);
    }

    .message {
      position: relative;
      z-index: 1;
      max-width: 670px;
      margin: 0 auto 30px;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.15rem);
      line-height: 1.7;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    .contact-box {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 16px 22px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    .contact-label {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .contact-email {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s ease;
    }

    .contact-email:hover {
      color: var(--accent);
    }

    .footer-note {
      position: relative;
      z-index: 1;
      margin-top: 26px;
      color: #7d8798;
      font-size: 0.9rem;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 640px) {
      .panel {
        padding: 38px 20px;
      }

      .slogan {
        font-size: 0.82rem;
        letter-spacing: 0.08em;
      }

      .contact-box {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <img src="ngp-logo.png" alt="Neo Gen Prime logo" class="logo" />

      <p class="slogan">Gaming News • Commentary • Future Content</p>

      <div class="tag">Neo Gen Prime</div>

      <h1>Site <span class="highlight">Under Construction</span></h1>

      <p class="message">
        The official Neo Gen Prime website is currently being built.
        A new home for updates, content, and future expansion is on the way.
      </p>

      <div class="contact-box">
        <span class="contact-label">Business enquiries:</span>
        <a class="contact-email" href="mailto:Business@NeoGenPrime.com">Business@NeoGenPrime.com</a>
      </div>

      <p class="footer-note">More updates coming soon.</p>
    </section>
  </main>
</body>
</html>
